<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Page & YouTube Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"><span></span></span>
          <div class="brand-copy">
            <h1>AI Summary</h1>
            <p id="subtitle">Current page</p>
          </div>
        </div>
        <button id="settings-open" type="button" class="icon-button" aria-label="Open settings">Settings</button>
      </header>

      <section id="summary-view" class="view">
        <div class="summary-toolbar">
          <select id="output-language" class="lang-select" aria-label="Summary language" title="Summary language">
            <option value="same">Auto (RU/CS → native, else English)</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="ru">Russian</option>
            <option value="uk">Ukrainian</option>
            <option value="tr">Turkish</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
          </select>
          <button id="summarize-button" type="button">Regenerate</button>
          <button id="copy-button" type="button" class="secondary" disabled>Copy</button>
        </div>

        <p id="status" class="status" role="status"></p>
        <div id="summary-result" class="summary-result" hidden></div>
      </section>

      <section id="settings-view" class="view" hidden>
        <form id="settings-form" class="form">
          <label class="field">
            <span>DeepSeek API key</span>
            <input id="api-key" type="password" autocomplete="off" placeholder="sk-..." spellcheck="false">
          </label>

          <div class="grid-2">
            <label class="field">
              <span>Model</span>
              <select id="model">
                <option value="deepseek-v4-flash">deepseek-v4-flash</option>
                <option value="deepseek-v4-pro">deepseek-v4-pro</option>
              </select>
            </label>

            <label class="field">
              <span>Summary language</span>
              <select id="summary-language">
                <option value="same">Auto (RU/CS → native, else English)</option>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="nl">Dutch</option>
                <option value="pl">Polish</option>
                <option value="ru">Russian</option>
                <option value="uk">Ukrainian</option>
                <option value="tr">Turkish</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="zh">Chinese</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span>Preferred captions</span>
            <input id="preferred-caption-language" type="text" maxlength="12" placeholder="en">
          </label>

          <label class="field">
            <span>Summary prompt (YouTube or article, depending on active tab)</span>
            <textarea id="summary-prompt" rows="7" spellcheck="true"></textarea>
          </label>

          <div class="grid-2">
            <label class="field">
              <span>YouTube transcript limit</span>
              <input id="max-transcript-chars" type="number" min="20000" max="600000" step="10000">
            </label>

            <label class="field">
              <span>Article limit</span>
              <input id="max-article-chars" type="number" min="20000" max="600000" step="10000">
            </label>
          </div>

          <label class="toggle">
            <input id="thinking-mode" type="checkbox">
            <span>Use DeepSeek thinking mode</span>
          </label>

          <div class="actions">
            <button type="submit">Save</button>
            <button id="clear-key" type="button" class="secondary">Clear key</button>
          </div>

          <p id="settings-status" class="status" role="status"></p>
        </form>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
